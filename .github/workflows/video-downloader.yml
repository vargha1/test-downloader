name: Download and Save Pornhub Video to Repo
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Pornhub Video URL (e.g., https://www.pornhub.com/view_video.php?viewkey=example)'
        required: true
        type: string
jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true  # Enable LFS support during checkout
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install yt-dlp and Git LFS
        run: |
          pip install yt-dlp
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install
      - name: Download Video
        run: |
          yt-dlp --no-playlist --format best --extractor-args "pornhub:skip=title" "${{ inputs.video_url }}" -o "downloaded_video.%(ext)s"
      - name: Track Large File with LFS
        run: |
          git lfs track "*.mp4"
          git add .gitattributes
      - name: Commit and Push Video to Repo
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add downloaded_video.mp4
          git commit -m "Add downloaded video from ${{ inputs.video_url }} via Actions"
          git push origin HEAD:${{ github.ref_name }}  # Push to the current branch
      - name: Handle Push Failure (Optional Merge if Needed)
        if: failure()
        run: |
          echo "Push failed—possibly due to branch protection. Consider manual merge or adjusting permissions."
